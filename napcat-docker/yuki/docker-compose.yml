# docker-compose.yml
# NAPCAT_UID=$(id -u) NAPCAT_GID=$(id -g) docker-compose -f ./docker-compose.yml up -d
# NAPCAT_UID=$(id -u) NAPCAT_GID=$(id -g) docker compose -f ./docker-compose.yml up -d
services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: yuki
    restart: always
    network_mode: bridge
    mac_address: 02:42:ac:12:10:00  # 添加MAC地址固化配置
    
    environment:
      - NAPCAT_UID=${NAPCAT_UID}
      - NAPCAT_GID=${NAPCAT_GID}
    
    ports:
      - 3001:3001
      - 6099:6099
    
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./ntqq:/app/.config/QQ
      - /home/ubuntu/yuki:/home/ubuntu/yuki # 填写项目实际路径